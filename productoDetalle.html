<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DistriSync - Detalle de Producto</title>
    <link rel="stylesheet" href="css/styleCatalogo.css">
    <style>
        .content {
            flex: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        .card {
            max-width: 900px;
            width: 100%;
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="logo">
            <img src="v1.png" alt="DistriSync Logo">
            <span>DistriSync</span>
        </div>
        <nav class="menu">
            <a href="catalogoProductos.html">Catálogo</a>
            <a href="miCuenta.html">Mi Cuenta</a>
            <a href="carrito.html">Carrito</a>
            <a href="dashboard.html" id="detalleDashboardLink" style="display:none;">Dashboard</a>
        </nav>
    </header>

    <div class="content">
        <div class="card">
            <button class="btn btn-outline" onclick="location.href='catalogoProductos.html'">← Volver al Catálogo</button>
            <h1 id="detalleNombre" style="color: #4B0082; margin-top: 20px;">Producto</h1>
            <div style="display: flex; gap: 30px; flex-wrap: wrap; margin-top: 20px;">
                <div style="flex: 1 1 300px; min-width: 250px;">
                    <img id="detalleImagen" src="" alt="" style="width: 100%; border-radius: 12px; border:1px solid #e6d4f5;" />
                </div>
                <div style="flex: 1 1 300px; min-width: 250px;">
                    <p><strong>Categoría:</strong> <span id="detalleCategoria"></span></p>
                    <p><strong>Precio:</strong> <span id="detallePrecio" style="color: #4B0082; font-weight: 600; font-size: 18px;"></span></p>
                    <p><strong>Stock:</strong> <span id="detalleStock"></span></p>
                    <p><strong>Descripción:</strong></p>
                    <p id="detalleDescripcion">Descripción detallada del producto.</p>

                    <div style="margin-top: 20px; display: flex; gap: 12px; flex-wrap: wrap;">
                        <button class="btn btn-action" id="btnAgregarCarrito" style="background: #4B0082; color: white; padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer;">Agregar al Carrito</button>
                        <button class="btn btn-info" id="btnIrCarrito" style="background: #6B2DA0; color: white; padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer;">Ir al Carrito</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/carrito.js"></script>
    <script src="js/productoDetalle.js"></script>
</body>
</html>
