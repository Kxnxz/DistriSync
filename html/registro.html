<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Registro - DistriSync</title>

        <!-- CSS -->
        <link rel="stylesheet" href="../css/styleRegistro.css" />

        <!-- Fuente -->
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div class="container">
            <div class="login-card">
                <h1>Crear cuenta</h1>
                <p>Regi­strate en DistriSync</p>

                <form id="registroForm">
                    <div class="input-group">
                        <input
                            type="text"
                            id="nombre"
                            placeholder="Nombre"
                            required
                        />
                        <input
                         type="text"
                         id="apellido"
                         placeholder="Apellido"
                          required
                          />
                    </div>

                    <div class="input-group">
                        <input
                            type="email"
                            id="email"
                            placeholder="Email"
                            required
                        />
                    </div>

                    <div class="input-group">
                        <input
                            type="password"
                            id="password"
                            placeholder="Contraseña"
                            required
                        />
                    </div>

                    <button type="submit" class="btn">Registrarse</button>

                    <p class="registro-link">
                        ¿Ya tienes cuenta?
                        <a href="LoginDistriSync.html">Inicia sesión</a>
                    </p>
                </form>
            </div>

            <div class="right-section">
                <img src="../v1.png" width="300" />
                <p>"DistriSync. Te facilita la conexion con tus productos"</p>
            </div>
        </div>

        <script src="../js/registro.js"></script>

        
    </body>
</html>
