<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Analytics - DistriSync</title>
    <link rel="stylesheet" href="../css/styleAnalytics.css">
</head>
<body>
    <div class="page-shell">
        <header class="page-header">
            <div>
                <h1>Analytics</h1>
                <p>Visión general de rendimiento, ingresos y tendencias.</p>
            </div>
            <a class="btn btn-secondary" href="dashboard.html">← Volver al Dashboard</a>
        </header>

        <section class="summary-grid">
            <article>
                <h2 id="ventasTotales">$0</h2>
                <p>Ventas totales</p>
            </article>
            <article>
                <h2 id="clientesActivos">0</h2>
                <p>Clientes activos</p>
            </article>
            <article>
                <h2 id="productosVendidos">0</h2>
                <p>Productos vendidos</p>
            </article>
        </section>

        <section class="card">
            <h2>Tendencias de ventas</h2>
            <div class="stat-row">
                <div>
                    <span class="label">Mes actual</span>
                    <strong id="mesActual">0%</strong>
                </div>
                <div>
                    <span class="label">Crecimiento</span>
                    <strong id="crecimiento">0%</strong>
                </div>
                <div>
                    <span class="label">Promedio</span>
                    <strong id="ticketPromedio">$0</strong>
                </div>
            </div>
        </section>
    </div>

    <script src="../js/analytics.js"></script>
</body>
</html>
