<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DistriSync - Login Administrador</title>
    <link rel="stylesheet" href="../css/styleLogin.css" />
</head>

<body data-admin="true">
    <header class="page-header">
        <div class="header-brand">
            <img src="../v1.png" alt="DistriSync" />
            <span>DistriSync</span>
        </div>
        <nav class="header-actions">
            <a href="login.html">Usuarios</a>
            <a href="registro.html">Registro</a>
            <a href="index.html">Inicio</a>
        </nav>
    </header>

    <div class="container">
        <div class="login-card">
            <h1>Ingreso Administrador</h1>
            <p>Accede solo con credenciales de administrador.</p>

            <form id="loginForm">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email" required />
                </div>

                <div class="input-group">
                    <input type="password" id="password" placeholder="Contraseña" required />
                </div>

                <button type="submit" class="btn">Ingresar</button>

                <p class="registro-link">
                    Volver a <a href="login.html">login de usuarios</a>
                </p>
            </form>
        </div>

        <div class="right-section">
            <img src="../v1.png" width="300" />
            <p>Panel administrador seguro para gestionar productos, pedidos y usuarios.</p>
        </div>
    </div>

    <script src="../js/ui.js"></script>
    <script src="../js/login.js"></script>
</body>

</html>
