<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pedidos - DistriSync</title>
    <link rel="stylesheet" href="css/stylePedidos.css">
</head>
<body>
    <div class="page-shell">
        <header class="page-header">
            <div>
                <h1>Pedidos</h1>
                <p>Revisa las órdenes recientes y su estado.</p>
            </div>
            <a class="btn btn-secondary" href="dashboard.html">← Volver al Dashboard</a>
        </header>

        <section class="summary-grid">
            <article>
                <h2 id="totalPedidos">0</h2>
                <p>Pedidos totales</p>
            </article>
            <article>
                <h2 id="pedidosPendientes">0</h2>
                <p>Pendientes</p>
            </article>
            <article>
                <h2 id="pedidosEntregados">0</h2>
                <p>Entregados</p>
            </article>
        </section>

        <section class="card">
            <h2>Listado de Pedidos</h2>
            <table id="tablaPedidos">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th>Fecha</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>
    </div>

    <script src="js/pedidos.js"></script>
</body>
</html>
