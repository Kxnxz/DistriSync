<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DistriSync - Catálogo Profesional</title>
    <!-- Enlace a tu CSS actualizado -->
    <link rel="stylesheet" href="css/styleCatalogo.css">
</head>
<body>
    <!-- Barra de navegación (Topbar) -->
    <header class="topbar">
        <div class="logo">
            <img src="v1.png" alt="DistriSync Logo">
            <span>DistriSync</span>
        </div>
        <nav class="menu">
            <a href="index.html">Inicio</a>
            <a href="miCuenta.html">Mi Cuenta</a>
            <a href="carrito.html">Carrito</a>
            <a href="dashboard.html" id="dashboardLink" style="display:none;">Dashboard</a>
        </nav>
    </header>

    <div class="container">
        <!-- Pestañas de categorías (Filtros) -->
        <div class="tabs">
            <button class="tab-btn active" onclick="filtrarProductos('todos')">📋 Todos</button>
            <button class="tab-btn" onclick="filtrarProductos('Maquillaje')">💄 Maquillaje</button>
            <button class="tab-btn" onclick="filtrarProductos('Skincare')">🧴 Skincare</button>
            <button class="tab-btn" onclick="filtrarProductos('Capilar')">💇 Capilar</button>
        </div>

        <!-- Contenedor donde el JS cargará las tarjetas -->
        <div id="productosGrid" class="products-grid">
            <!-- Los productos se cargan dinámicamente aquí -->
        </div>
    </div>

    <footer>
        <p>&copy; 2026 DistriSync - Todos los derechos reservados</p>
    </footer>

    <!-- Tus scripts de lógica -->
    <script src="js/carrito.js"></script>
    <script src="js/catalogoProductos.js"></script>
</body>
</html>
